<!DOCTYPE html>
<html>

<head>
  <title>Submit Ticket</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      border-radius: 20px;
      padding: 30px;
      width: 420px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h3 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
    }

    .btn-submit {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 500;
      transition: 0.3s;
      color: white;
    }

    .btn-submit:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .icon {
      margin-right: 8px;
    }
  </style>
</head>

<body>

<div class="card">

  <h3><i class="fas fa-ticket-alt icon"></i> Submit Ticket</h3>

  <form action="/submit" method="POST">

    <input class="form-control mb-3" name="name" placeholder="👤 Your Name" required>

    <input class="form-control mb-3" name="email" placeholder="📧 Your Email" required>

    <textarea class="form-control mb-3" name="issue" placeholder="📝 Describe your issue" required></textarea>

    <select class="form-control mb-3" name="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <button class="btn btn-submit w-100">
       Submit Ticket
    </button>

  </form>

</div>

</body>
</html>
