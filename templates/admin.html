<!DOCTYPE html>
<html>

<head>
  <title>Admin Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #f8f9fb);
      font-family: 'Poppins', sans-serif;
    }

    .navbar {
      background: linear-gradient(90deg, #1f2937, #111827);
    }

    table tbody tr:hover {
      background-color: #f1f5f9;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 d-flex justify-content-between">
  <span class="navbar-brand">
    <i class="fas fa-ticket-alt"></i> Ticket Admin Panel
  </span>

  <a href="/logout" class="btn btn-danger btn-sm">
    Logout
  </a>
</nav>

<div class="container mt-4">

  <!-- Table -->
  <table class="table table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Issue</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>
    </thead>

    <tbody>
      {% for t in tickets %}
      <tr>

        <td>#{{ t[0] }}</td>
        <td>{{ t[1] }}</td>
        <td>{{ t[2] }}</td>
        <td>{{ t[3] }}</td>

        <td>
          <span class="badge bg-info">{{ t[4] }}</span>
        </td>

        <td>
          {% if t[5] == "Open" %}
            <span class="badge bg-danger">🔴 Open</span>
          {% elif t[5] == "In Progress" %}
            <span class="badge bg-warning text-dark">🟡 In Progress</span>
          {% else %}
            <span class="badge bg-success">🟢 Closed</span>
          {% endif %}
        </td>

        <!-- UPDATE -->
        <td>
          <form action="{{ url_for('update_ticket', id=t[0]) }}" method="POST">
            <select name="status" class="form-select form-select-sm mb-2">
              <option>Open</option>
              <option>In Progress</option>
              <option>Closed</option>
            </select>
            <button class="btn btn-dark btn-sm w-100">
              Update
            </button>
          </form>
        </td>

        <!-- DELETE -->
        <td>
          <form action="/delete/{{ t[0] }}" method="POST"
                onsubmit="return confirm('Are you sure you want to delete this ticket?');">
            <button class="btn btn-danger btn-sm w-100">
              🗑 Delete
            </button>
          </form>
        </td>

      </tr>
      {% endfor %}
    </tbody>
  </table>

</div>

</body>
</html>
