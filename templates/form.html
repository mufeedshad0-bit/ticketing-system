<!DOCTYPE html>
<html>
<head>
  <title>Submit Ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3>Submit Ticket</h3>

    <form action="{{ url_for('submit') }}" method="POST">
      <input class="form-control mb-3" name="name" placeholder="Name" required>
      <input class="form-control mb-3" name="email" placeholder="Email" required>
      <textarea class="form-control mb-3" name="issue" placeholder="Issue" required></textarea>

      <select class="form-control mb-3" name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <button class="btn btn-dark w-100">Submit</button>
    </form>

  </div>
</div>

</body>
</html>
