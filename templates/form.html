<!DOCTYPE html>
<html>
<head>
  <title>Submit Ticket</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .card {
      border-radius: 15px;
    }

    h3 {
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container mt-5 d-flex justify-content-center">
  <div class="card p-4 shadow-lg" style="width:500px;">

    <h3 class="mb-4 text-center"> Submit Ticket</h3>

    <!-- ✅ SUCCESS MESSAGE -->
    {% if success %}
      <div class="alert alert-success text-center">
        {{ success }}
      </div>
    {% endif %}

    <form action="{{ url_for('submit') }}" method="POST">

      <!-- NAME -->
      <div class="mb-3">
        <label class="form-label">Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input class="form-control" name="name" placeholder="Enter your name" required>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input class="form-control" name="email" type="email" placeholder="Enter your email" required>
        </div>
      </div>

      <!-- ISSUE -->
      <div class="mb-3">
        <label class="form-label">Issue</label>
        <textarea class="form-control" name="issue" placeholder="Describe your issue..." required></textarea>
      </div>

      <!-- 🆕 CATEGORY -->
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-control" name="category">
          <option>Technical</option>
          <option>Billing</option>
          <option>General</option>
        </select>
      </div>

      <!-- PRIORITY -->
      <div class="mb-3">
        <label class="form-label">Priority</label>
        <select class="form-control" name="priority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>

      <!-- BUTTON -->
      <button class="btn btn-dark w-100">
        <i class="bi bi-send"></i> Submit Ticket
      </button>

    </form>

  </div>
</div>

</body>
</html>
