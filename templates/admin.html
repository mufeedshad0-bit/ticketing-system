<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
  <span class="navbar-brand">Ticket Admin</span>
  <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
</nav>

<div class="container mt-4">

<table class="table table-bordered">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Issue</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Update</th>
      <th>Delete</th>
    </tr>
  </thead>

  <tbody>
    {% for t in tickets %}
    <tr>
      <td>{{ t[0] }}</td>
      <td>{{ t[1] }}</td>
      <td>{{ t[2] }}</td>
      <td>{{ t[3] }}</td>
      <td>{{ t[4] }}</td>
      <td>{{ t[5] }}</td>

      <td>
        <form action="{{ url_for('update_ticket', id=t[0]) }}" method="POST">
          <select name="status" class="form-control mb-1">
            <option>Open</option>
            <option>In Progress</option>
            <option>Closed</option>
          </select>
          <button class="btn btn-primary btn-sm">Update</button>
        </form>
      </td>

      <td>
        <form action="{{ url_for('delete_ticket', id=t[0]) }}" method="POST">
          <button class="btn btn-danger btn-sm">Delete</button>
        </form>
      </td>

    </tr>
    {% endfor %}
  </tbody>

</table>

</div>

</body>
</html>
